name: nyc_taxi
schedule: daily
start_date: "2022-01-01"

default_connections:
  duckdb: duckdb-default

tasks:
  ingestion.trips:
    type: python
    path: assets/ingestion/trips.py
    # outputs are defined in the asset header (assets/ingestion/trips.py)

variables:
  taxi_types:
    type: array
    items:
      type: string
    default: ["yellow"]
